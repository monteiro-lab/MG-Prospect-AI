version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: mg_user
      POSTGRES_PASSWORD: mg_password
      POSTGRES_DB: mg_prospect
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://mg_user:mg_password@db:5432/mg_prospect
    depends_on:
      - db
    volumes:
      - .:/app

volumes:
  postgres_data: