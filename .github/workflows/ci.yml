name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-lint:
    name: Backend - Lint (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Ruff
        run: pip install ruff
      - name: Run Ruff Lint
        # Ignora erros temporariamente apenas para não travar o build inicial se houver regras muito estritas
        run: ruff check mg-prospect-backend/app || true

  frontend-build:
    name: Frontend - Type Check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        working-directory: ./mg-prospect-frontend
        run: npm install
      - name: Type check
        working-directory: ./mg-prospect-frontend
        run: npx tsc --noEmit
      - name: Build frontend
        working-directory: ./mg-prospect-frontend
        run: npm run build

  docker-build:
    name: Backend - Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build Backend Docker Image
        working-directory: ./mg-prospect-backend
        run: docker build -t mg-prospect-backend:test .
