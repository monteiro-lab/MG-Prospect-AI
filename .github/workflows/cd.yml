name: CD Pipeline

on:
  push:
    branches: [ "main" ]
  # Executa o CD apenas depois que o CI terminar com sucesso
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed

jobs:
  deploy:
    name: Deploy to Production
    # Garante que só roda se o CI passou (caso seja engatilhado pelo workflow_run)
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    
    steps:
      - name: SSH Deploy via GitHub Actions
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # Substitua o caminho `/var/www/mg-prospect-ai` pelo caminho real no seu servidor
          script: |
            cd /var/www/mg-prospect-ai
            git pull origin main
            
            # Recria as imagens do Backend caso o Dockerfile ou dependências tenham mudado
            cd mg-prospect-backend
            docker compose build
            docker compose up -d
            
            # Roda as migrations do banco de dados no container recém subido
            docker exec mg-prospect-backend-api-1 alembic upgrade head
            
            # Reconstrói o Frontend (se estiver rodando via build local + Nginx)
            # cd ../mg-prospect-frontend
            # npm install
            # npm run build
